<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <title>min-pro-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        window.webllm = webllm;
    </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

    <header class="p-4 border-b border-slate-700 flex justify-between items-center">
        <h1 class="text-sm font-bold">AI Lite</h1>
        <select id="model-select" class="bg-slate-800 text-xs p-1 rounded">
            <optgroup label="1B以下 (極軽量)">
                <option value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC" selected>Qwen 2.5 0.5B</option>
                <option value="SmolLM2-360M-Instruct-q4f16_1-MLC">SmolLM2 360M</option>
                <option value="SmolLM2-135M-Instruct-q4f16_1-MLC">SmolLM2 135M</option>
                <option value="MobileLLM-125M-Instruct-q4f16_1-MLC">MobileLLM 125M</option>
            </optgroup>
            <optgroup label="1B~2B (バランス)">
                <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC">Qwen 2.5 1.5B</option>
                <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B</option>
            </optgroup>
        </select>
        <button id="load-btn" onclick="switchModel()" class="bg-indigo-600 px-3 py-1 text-xs rounded">Load</button>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 max-w-2xl mx-auto w-full"></main>

    <footer class="p-4 border-t border-slate-700">
        <div class="flex gap-2">
            <textarea id="user-input" disabled class="w-full bg-slate-800 rounded p-2 text-sm" placeholder="モデルロード中..."></textarea>
            <button id="send-btn" onclick="handleSend()" disabled class="bg-indigo-600 px-4 rounded"><i data-lucide="send"></i></button>
            <button id="stop-btn" onclick="stopGeneration()" class="hidden bg-rose-600 px-4 rounded"><i data-lucide="square"></i></button>
        </div>
        <p id="model-status" class="text-[10px] text-slate-500 mt-2 text-center">Waiting for load...</p>
    </footer>

    <script>
        let engine = null;
        let chatHistory = [];
        let abortController = null;

        // ページ読み込み時にqwen2.5:0.5bをloadする
        window.onload = () => {
            document.getElementById('model-select').value = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC";
            switchModel();
        };

        async function switchModel() {
            const modelId = document.getElementById('model-select').value;
            document.getElementById('model-status').innerText = "Loading " + modelId + "... (GPUがない場合Wasmで動作します)";
            if (engine) await engine.unload();
            
            engine = await webllm.CreateMLCEngine(modelId, {
                initProgressCallback: (r) => document.getElementById('model-status').innerText = r.text
            });
            
            document.getElementById('user-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('model-status').innerText = "Active: " + modelId;
            chatHistory = [{ role: "system", content: "日本語で回答してください。" }];
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = "";
            appendMessage("user", text);
            chatHistory.push({ role: "user", content: text });

            const aiBubble = appendMessage("ai", "");
            abortController = new AbortController();
            document.getElementById('send-btn').classList.add('hidden');
            document.getElementById('stop-btn').classList.remove('hidden');

            try {
                const chunks = await engine.chat.completions.create({
                    messages: chatHistory,
                    stream: true,
                    signal: abortController.signal
                });

                let fullText = "";
                for await (const chunk of chunks) {
                    fullText += chunk.choices[0]?.delta?.content || "";
                    aiBubble.innerText = fullText;
                }
                chatHistory.push({ role: "assistant", content: fullText });
            } catch (e) {
                if (e.name !== 'AbortError') aiBubble.innerText = "エラー発生: " + e.message;
            } finally {
                cleanupUI();
            }
        }

        function stopGeneration() {
            if (abortController) abortController.abort();
            cleanupUI();
        }

        function cleanupUI() {
            document.getElementById('send-btn').classList.remove('hidden');
            document.getElementById('stop-btn').classList.add('hidden');
        }

        function appendMessage(role, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `p-3 rounded ${role === 'user' ? 'bg-indigo-900 ml-auto' : 'bg-slate-800'} max-w-[80%] text-sm`;
            div.innerText = text;
            box.appendChild(div);
            return div;
        }
        lucide.createIcons();
    </script>
</body>
</html>
